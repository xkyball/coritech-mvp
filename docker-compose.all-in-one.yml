services:
  coritech:
    build:
      context: .
      dockerfile: Dockerfile.all-in-one
    env_file:
      - ${CORITECH_ALL_IN_ONE_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - coritech_all_in_one_data:/var/lib/coritech
    restart: unless-stopped

volumes:
  coritech_all_in_one_data:
