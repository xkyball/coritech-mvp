services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coritech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coritech_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-coritech_mvp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - coritech_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-coritech_minio_dev}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-coritech_minio_dev_password}
    ports:
      - "${OBJECT_STORAGE_PORT:-9000}:9000"
      - "${OBJECT_STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - coritech_minio_data:/data

  minio-init:
    image: minio/mc:latest
    environment:
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-coritech-local-dev}
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-coritech_minio_dev}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-coritech_minio_dev_password}
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set coritech-local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\"; do
        sleep 2;
      done;
      mc mb --ignore-existing \"coritech-local/$${OBJECT_STORAGE_BUCKET}\";
      mc anonymous set none \"coritech-local/$${OBJECT_STORAGE_BUCKET}\";
      "
    restart: "no"

  migrate-seed:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "npm run db:migrate &&
      npm run db:seed"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-coritech}:${POSTGRES_PASSWORD:-coritech_dev_password}@db:5432/${POSTGRES_DB:-coritech_mvp}?schema=public
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm --workspace @coritech/web run dev -- --hostname 0.0.0.0 --port 3000
    env_file:
      - .env
    environment:
      CORITECH_ENVIRONMENT: ${CORITECH_ENVIRONMENT:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-coritech}:${POSTGRES_PASSWORD:-coritech_dev_password}@db:5432/${POSTGRES_DB:-coritech_mvp}?schema=public
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
      AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-30}
      AUTH_PROVIDER_CLIENT_ID: ${AUTH_PROVIDER_CLIENT_ID:-replace-before-managed-auth-setup}
      AUTH_PROVIDER_CLIENT_SECRET: ${AUTH_PROVIDER_CLIENT_SECRET:-replace-before-managed-auth-setup}
      AUTH_PROVIDER_DOMAIN: ${AUTH_PROVIDER_DOMAIN:-https://accounts.google.com}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_PROVIDER_API_KEY: ${EMAIL_PROVIDER_API_KEY:-replace-before-email-provider-setup}
      EMAIL_PROVIDER_ENDPOINT: ${EMAIL_PROVIDER_ENDPOINT:-http://localhost:3000/api/dev-email}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-support@local.coritech.test}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-CoriTech Local}
      MONITORING_PROVIDER: ${MONITORING_PROVIDER:-console}
      MONITORING_ENDPOINT: ${MONITORING_ENDPOINT:-http://localhost:3000/api/dev-monitoring}
      ERROR_TRACKING_DSN: ${ERROR_TRACKING_DSN:-local-error-tracking-disabled}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-CoriTech MVP}
      OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-minio}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-minio}
      OBJECT_STORAGE_PORT: ${OBJECT_STORAGE_PORT:-9000}
      OBJECT_STORAGE_USE_SSL: ${OBJECT_STORAGE_USE_SSL:-false}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-coritech-local-dev}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-local-dev}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-coritech_minio_dev}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-coritech_minio_dev_password}
      PAYMENT_PROVIDER_SECRET: ${PAYMENT_PROVIDER_SECRET:-replace-before-payment-provider-setup}
      LOGISTICS_PROVIDER_API_KEY: ${LOGISTICS_PROVIDER_API_KEY:-replace-before-logistics-provider-setup}
      NODE_ENV: development
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate-seed:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  coritech_postgres_data:
  coritech_minio_data:
